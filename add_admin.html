<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Admin - AI Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="admin-style.css">
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-header">
        <div>
            <h2>AI Solutions</h2>
            <p>Admin Panel</p>
        </div>
    </div>
    <div class="sidebar-menu">
        <a href="dashboard.html" class="menu-item">
            <i class="fas fa-home"></i>
            <span>Dashboard</span>
        </a>
        <a href="inquiries.html" class="menu-item">
            <i class="fas fa-envelope"></i>
            <span>Inquiries</span>
        </a>
        <a href="content.html" class="menu-item">
            <i class="fas fa-file-alt"></i>
            <span>Content</span>
        </a>
        <a href="add-admin.html" class="menu-item active">
            <i class="fas fa-user-plus"></i>
            <span>Add Admin</span>
        </a>
        <div class="menu-divider"></div>
        <div class="menu-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i>
            <span>Logout</span>
        </div>
    </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <div class="top-bar">
        <div class="page-title">
            <h1>👤 Add New Admin</h1>
            <p>Create a new administrator account</p>
        </div>
        <div class="user-info">
            <div class="admin-avatar"><i class="fas fa-user"></i></div>
            <div class="admin-details">
                <h4 class="admin-name">Admin User</h4>
                <p>Administrator</p>
            </div>
        </div>
    </div>

    <div style="max-width: 600px;">
        <div class="table-container">
            <h3 style="margin-bottom:20px;">Admin Registration</h3>
            <form id="addAdminForm">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="adminFullName" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="adminEmail" required>
                </div>
                <div class="form-group">
                    <label>Username *</label>
                    <input type="text" id="adminUsername" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="adminPassword" required>
                </div>
                <button type="submit" class="btn-submit">Create Admin Account</button>
            </form>
            <div id="adminFormMessage" style="margin-top:15px;"></div>
        </div>
    </div>
</div>

<script src="admin-script.js"></script>
<script>
    document.getElementById('addAdminForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const fullName = document.getElementById('adminFullName').value;
        const email = document.getElementById('adminEmail').value;
        const username = document.getElementById('adminUsername').value;
        const password = document.getElementById('adminPassword').value;

        const messageDiv = document.getElementById('adminFormMessage');
        messageDiv.innerHTML = '<div style="background:#d1fae5; color:#10b981; padding:12px; border-radius:8px;">⏳ Creating admin account...</div>';

        try {
            const response = await fetch('api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ fullName, email, username, password })
            });
            const result = await response.json();

            if (result.success) {
                messageDiv.innerHTML = '<div style="background:#d1fae5; color:#10b981; padding:12px; border-radius:8px;">✅ Admin created successfully!</div>';
                document.getElementById('addAdminForm').reset();
            } else {
                messageDiv.innerHTML = '<div style="background:#fee2e2; color:#ef4444; padding:12px; border-radius:8px;">❌ ' + result.message + '</div>';
            }
        } catch (error) {
            messageDiv.innerHTML = '<div style="background:#fee2e2; color:#ef4444; padding:12px; border-radius:8px;">❌ Network error: ' + error.message + '</div>';
        }
    });
</script>
</body>
</html>
